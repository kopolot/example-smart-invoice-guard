<VirtualHost *:8080>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php index.html index.phtml index

    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://php-fpm:9000/"
    </FilesMatch>
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
